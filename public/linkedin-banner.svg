<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#374151" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- Cream background -->
  <rect width="1584" height="396" fill="#FFF8F0"/>
  <rect width="1584" height="396" fill="url(#dots)"/>

  <!-- Background oversized shapes (low opacity, sit behind everything) -->
  <g opacity="0.22">
    <!-- Big triangle -->
    <polygon points="520,20 720,320 320,320" fill="none" stroke="#F09065" stroke-width="6"/>
    <!-- Big circle with inner dot -->
    <circle cx="1320" cy="210" r="130" fill="none" stroke="#374151" stroke-width="6"/>
    <circle cx="1320" cy="210" r="46" fill="#FFC133"/>
    <!-- Big pentagon -->
    <polygon points="180,220 275,289 239,400 121,400 85,289" fill="#FFEFCC" stroke="#F09065" stroke-width="6"/>
    <!-- Big filled square with offset -->
    <rect x="900" y="40" width="150" height="150" fill="#FFC133" stroke="#374151" stroke-width="6"/>
  </g>

  <!-- Top dark band with yellow stripes -->
  <rect x="0" y="0" width="1584" height="10" fill="#FFC133"/>
  <rect x="0" y="386" width="1584" height="10" fill="#FFC133"/>

  <!-- Left cluster: offset cards (signature drop-shadow style) -->
  <g transform="translate(20,20)">
    <!-- Yellow shadow block -->
    <rect x="16" y="16" width="260" height="150" fill="#FFC133" stroke="#374151" stroke-width="4"/>
    <!-- Front card -->
    <rect x="0" y="0" width="260" height="150" fill="#FFF8F0" stroke="#374151" stroke-width="4"/>
    <text x="20" y="54" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="28" fill="#261d08">Senior UX</text>
    <text x="20" y="92" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="28" fill="#261d08">Designer</text>
    <text x="20" y="128" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="20" fill="#F09065">&amp; Researcher</text>
  </g>

  <!-- Center chip grid (echoing the About page tag row) -->
  <g transform="translate(340,90)" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="17">
    <!-- Row 1 -->
    <g>
      <rect x="0" y="0" width="145" height="44" fill="#FFEFCC" stroke="#F09065" stroke-width="3"/>
      <text x="72" y="29" text-anchor="middle" fill="#261d08">Compliance</text>
    </g>
    <g transform="translate(165,0)">
      <rect x="0" y="0" width="155" height="44" fill="#FFEFCC" stroke="#F09065" stroke-width="3"/>
      <text x="77" y="29" text-anchor="middle" fill="#261d08">ERP systems</text>
    </g>
    <g transform="translate(340,0)">
      <rect x="0" y="0" width="145" height="44" fill="#FFEFCC" stroke="#F09065" stroke-width="3"/>
      <text x="72" y="29" text-anchor="middle" fill="#261d08">AI solutions</text>
    </g>
    <g transform="translate(505,0)">
      <rect x="0" y="0" width="230" height="44" fill="#FFEFCC" stroke="#F09065" stroke-width="3"/>
      <text x="115" y="29" text-anchor="middle" fill="#261d08">Developer Experience</text>
    </g>
    <!-- Row 2 -->
    <g transform="translate(0,62)">
      <rect x="0" y="0" width="180" height="44" fill="#FFEFCC" stroke="#F09065" stroke-width="3"/>
      <text x="90" y="29" text-anchor="middle" fill="#261d08">Pharma Business</text>
    </g>
    <g transform="translate(200,62)">
      <rect x="0" y="0" width="170" height="44" fill="#FFEFCC" stroke="#F09065" stroke-width="3"/>
      <text x="85" y="29" text-anchor="middle" fill="#261d08">User Research</text>
    </g>
    <g transform="translate(390,62)">
      <rect x="0" y="0" width="180" height="44" fill="#FFEFCC" stroke="#F09065" stroke-width="3"/>
      <text x="90" y="29" text-anchor="middle" fill="#261d08">Product Metrics</text>
    </g>
    <g transform="translate(590,62)">
      <rect x="0" y="0" width="145" height="44" fill="#FFEFCC" stroke="#F09065" stroke-width="3"/>
      <text x="72" y="29" text-anchor="middle" fill="#261d08">Vibe Coding</text>
    </g>
    <!-- Row 3 -->
    <g transform="translate(0,124)">
      <rect x="0" y="0" width="365" height="44" fill="#FFEFCC" stroke="#F09065" stroke-width="3"/>
      <text x="182" y="29" text-anchor="middle" fill="#261d08">Complex Systems</text>
    </g>
    <g transform="translate(385,124)">
      <rect x="0" y="0" width="350" height="44" fill="#FFEFCC" stroke="#F09065" stroke-width="3"/>
      <text x="175" y="29" text-anchor="middle" fill="#261d08">End-to-End Process</text>
    </g>
  </g>

  <!-- Right side: signature offset block with tagline -->
  <g transform="translate(1100,90)">
    <rect x="16" y="16" width="420" height="200" fill="#FFC133" stroke="#374151" stroke-width="4"/>
    <rect x="0" y="0" width="420" height="200" fill="#FFF8F0" stroke="#374151" stroke-width="4"/>
    <text x="24" y="54" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="26" fill="#261d08">Designing</text>
    <text x="24" y="90" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="26" fill="#261d08">complex systems</text>
    <text x="24" y="126" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="26" fill="#261d08">end-to-end.</text>
    <!-- Skewed yellow underline accent -->
    <polygon points="24,140 280,140 270,150 14,150" fill="#FFC133"/>
  </g>

  <!-- Floating geometric accents -->
  <!-- Triangle -->
  <polygon points="760,40 790,88 730,88" fill="none" stroke="#F09065" stroke-width="3"/>
  <!-- Circle -->
  <circle cx="1050" cy="60" r="22" fill="none" stroke="#374151" stroke-width="3"/>
  <circle cx="1050" cy="60" r="8" fill="#FFC133"/>
  <!-- Diagonal stripes -->
  <g stroke="#F09065" stroke-width="3">
    <line x1="920" y1="330" x2="960" y2="290"/>
    <line x1="936" y1="336" x2="976" y2="296"/>
    <line x1="952" y1="342" x2="992" y2="302"/>
  </g>
  <!-- Small filled square -->
  <rect x="290" y="320" width="24" height="24" fill="#FFC133" stroke="#374151" stroke-width="3"/>
  <!-- Extra circle+dot (top-left) -->
  <circle cx="340" cy="50" r="18" fill="none" stroke="#374151" stroke-width="3"/>
  <circle cx="340" cy="50" r="7" fill="#FFC133"/>
  <!-- Extra filled square (bottom-center) -->
  <rect x="720" y="328" width="22" height="22" fill="#FFC133" stroke="#374151" stroke-width="3"/>
  <!-- Extra circle+dot (top-right) -->
  <circle cx="1400" cy="50" r="16" fill="none" stroke="#374151" stroke-width="3"/>
  <circle cx="1400" cy="50" r="6" fill="#FFC133"/>
  <!-- Pentagon (5-sided) -->
  <polygon points="1200,310 1219,324 1212,346 1188,346 1181,324" fill="#FFEFCC" stroke="#F09065" stroke-width="3"/>
  <!-- Outlined square -->
  <rect x="1480" y="320" width="28" height="28" fill="none" stroke="#374151" stroke-width="3"/>
  <rect x="1486" y="326" width="28" height="28" fill="#FFC133" stroke="#374151" stroke-width="3"/>
</svg>
